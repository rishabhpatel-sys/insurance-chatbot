<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Insurance Chatbot Demo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 2rem auto; }
    #chat { border: 1px solid #ddd; padding: 1rem; height: 60vh; overflow:auto }
    .msg { margin: .5rem 0 }
    .user { color: blue }
    .bot { color: green }
  </style>
</head>
<body>
  <h1>Insurance Chatbot (Demo)</h1>
  <div id="chat"></div>
  <form id="form">
    <input id="input" placeholder="Ask about policies, claims, offers..." style="width:80%" />
    <button type="submit">Send</button>
  </form>

  <script>
    const apiBase = location.hostname === 'localhost' ? 'http://localhost:8000' : ''
    const chatEl = document.getElementById('chat')
    const form = document.getElementById('form')
    const input = document.getElementById('input')

    function addMsg(text, cls){
      const d = document.createElement('div'); d.className='msg '+cls; d.textContent=text; chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const text = input.value.trim(); if(!text) return;
      addMsg('You: '+text, 'user')
      input.value=''
      addMsg('Thinking...', 'bot')

      try{
        const res = await fetch(apiBase + '/chat', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: text})
        })
        const data = await res.json()
        chatEl.lastChild.textContent = 'Bot: '+(data.reply || data.error || 'No reply')
        if(data.sources && data.sources.length){
          const s = document.createElement('div'); s.style.fontSize='0.9rem'; s.style.marginTop='0.25rem'; s.textContent = 'Sources: '+data.sources.map(x=>x.title+'#'+x.chunk_index).join(', ')
          chatEl.appendChild(s)
        }
      }catch(err){
        chatEl.lastChild.textContent = 'Bot: Error connecting to API'
      }
    })
  </script>
</body>
</html>
